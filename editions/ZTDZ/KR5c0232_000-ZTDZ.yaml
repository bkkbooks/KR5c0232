body:
  text: 唐思邈孫眞人述人若勞於形百病不能成飲酒忌大醉諸疾自不生食了行百歩數將手摩肚睡不苦髙枕唾涕不遠顧寅丑日剪甲理髮須百度飽則立小便飢乃坐漩溺行坐莫當風居處無小隟向北大小便一生昏羃羃日月固然忌水火仍畏避毎夜洗脚卧飽食絳無益忍辱爲上乗讒言斷親戚思慮最傷神喜怒傷和息毎去鼻中毛常習不唾地平明欲起時下牀先左脚一日免灾咎去邪兼辟惡但能七星歩今人長夀樂酸味傷於筋辛味損正氣苦則損於心甘則傷其志鹹多促人夀不得偏耽嗜春夏任宣通秋冬固陽事獨卧是守眞慎靜最爲貴財帛生有分知足將爲利强知是大患少欲終無累神氣自然存學道須終始書於壁戶間將用傳君子保生銘终
  hash: sha256:640f1d242022641fd2486b355526d334bd68caa4377081fa3e9bc7a7f1950d30
